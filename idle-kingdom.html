<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ 방치형 왕국 - Idle Kingdom</title>
<style>
  /* ===== 기본 리셋 & 테마 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f1117;
    --panel: #1a1d29;
    --panel-2: #222634;
    --accent: #ffb648;
    --accent-2: #ff7a48;
    --green: #4ade80;
    --text: #e7e9ee;
    --muted: #8b90a0;
    --border: #2a2f3f;
  }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1c2233, var(--bg));
    color: var(--text);
    overflow-x: hidden;
    user-select: none;
  }
  #app {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 14px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ===== 상단 헤더 ===== */
  header { text-align: center; }
  header h1 { font-size: 22px; letter-spacing: 1px; }
  header h1 .sub { color: var(--muted); font-size: 12px; font-weight: normal; display:block; margin-top:2px;}

  .stat-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    justify-content: space-around;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  .stat .val { font-size: 26px; font-weight: 800; color: var(--accent); }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: .5px; }
  .stat .val.gold { color: var(--accent); }
  .stat .val.rate { color: var(--green); }
  .stat .val.gem { color: #a78bfa; }

  /* ===== 클릭 영역 ===== */
  .click-zone {
    background: linear-gradient(160deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .big-btn {
    font-size: 64px;
    line-height: 1;
    cursor: pointer;
    display: inline-block;
    transition: transform .06s ease;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.5));
  }
  .big-btn:active { transform: scale(.9); }
  .click-zone .hint { color: var(--muted); font-size: 13px; margin-top: 12px; }
  .click-zone .per-click { color: var(--accent); font-weight: 700; }

  /* 클릭 시 떠오르는 숫자 */
  .float {
    position: absolute;
    font-weight: 800;
    color: var(--accent);
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    font-size: 20px;
    text-shadow: 0 2px 4px rgba(0,0,0,.6);
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(1.3); }
  }

  /* ===== 탭 ===== */
  .tabs { display: flex; gap: 8px; }
  .tab {
    flex: 1; text-align: center; padding: 10px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--border);
    cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted);
    transition: all .15s;
  }
  .tab.active { color: var(--text); border-color: var(--accent); background: var(--panel-2); }

  /* ===== 업그레이드 목록 ===== */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform .08s, border-color .15s, background .15s;
  }
  .card:active { transform: scale(.98); }
  .card.affordable { border-color: var(--accent); }
  .card.locked { opacity: .45; filter: grayscale(.6); cursor: not-allowed; }
  .card .icon { font-size: 34px; width: 44px; text-align: center; }
  .card .info { flex: 1; min-width: 0; }
  .card .name { font-weight: 700; font-size: 15px; }
  .card .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card .right { text-align: right; flex-shrink: 0; }
  .card .cost { font-weight: 700; color: var(--accent); font-size: 14px; }
  .card .cost.cant { color: #ef5f5f; }
  .card .owned { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card .prod { font-size: 11px; color: var(--green); margin-top: 2px; }

  /* ===== 프레스티지 패널 ===== */
  .prestige-panel {
    background: linear-gradient(160deg, #2a1e3d, #1a1d29);
    border: 1px solid #4c3a6e;
    border-radius: 16px;
    padding: 18px;
    text-align: center;
  }
  .prestige-panel h3 { color: #a78bfa; margin-bottom: 8px; }
  .prestige-panel p { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .prestige-panel .gain { color: #a78bfa; font-weight: 800; font-size: 20px; margin: 8px 0; }

  /* ===== 버튼 ===== */
  .btn {
    border: none; border-radius: 12px; padding: 12px 18px;
    font-size: 14px; font-weight: 700; cursor: pointer; color: #1a1207;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    transition: transform .08s, opacity .15s;
  }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.purple { background: linear-gradient(135deg, #a78bfa, #7c5cf0); color: #fff; }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  .footer-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* ===== 오프라인 보상 모달 ===== */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 18px; padding: 26px; text-align: center; max-width: 340px;
    animation: pop .3s ease;
  }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h2 { color: var(--accent); margin-bottom: 10px; }
  .modal .amount { font-size: 30px; font-weight: 800; color: var(--green); margin: 14px 0; }
  .modal p { color: var(--muted); font-size: 13px; }

  /* 토스트 */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 20px; font-size: 13px; z-index: 200;
    opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⚔️ 방치형 왕국
      <span class="sub">Idle Kingdom — 왕국을 키워 대륙을 지배하라</span>
    </h1>
  </header>

  <!-- 상단 스탯 -->
  <div class="stat-bar">
    <div class="stat">
      <div class="val gold" id="goldVal">0</div>
      <div class="lbl">💰 골드</div>
    </div>
    <div class="stat">
      <div class="val rate" id="rateVal">0</div>
      <div class="lbl">⏱️ 초당 생산</div>
    </div>
    <div class="stat">
      <div class="val gem" id="gemVal">0</div>
      <div class="lbl">💎 왕관(환생)</div>
    </div>
  </div>

  <!-- 클릭 영역 -->
  <div class="click-zone" id="clickZone">
    <div class="big-btn" id="bigBtn">🏰</div>
    <div class="hint">왕국을 눌러 <span class="per-click" id="perClick">1</span> 골드 채집</div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" data-tab="build">🏗️ 건설</div>
    <div class="tab" data-tab="upgrade">⬆️ 강화</div>
    <div class="tab" data-tab="prestige">👑 환생</div>
  </div>

  <!-- 건설 탭 -->
  <div id="tab-build" class="list"></div>

  <!-- 강화 탭 -->
  <div id="tab-upgrade" class="list hidden"></div>

  <!-- 환생 탭 -->
  <div id="tab-prestige" class="hidden">
    <div class="prestige-panel">
      <h3>👑 환생 (프레스티지)</h3>
      <p>왕국을 리셋하는 대신 <b>왕관</b>을 얻습니다.<br>
         왕관 1개당 <b>모든 생산량 +10%</b> 영구 보너스!</p>
      <div class="gain">환생 시 획득: 💎 <span id="prestigeGain">0</span> 왕관</div>
      <p id="prestigeReq" style="margin-bottom:14px;"></p>
      <button class="btn purple" id="prestigeBtn">👑 환생하기</button>
    </div>
  </div>

  <!-- 하단 액션 -->
  <div class="footer-actions">
    <button class="btn ghost" id="saveBtn">💾 저장</button>
    <button class="btn ghost" id="resetBtn">🗑️ 초기화</button>
  </div>
</div>

<!-- 오프라인 보상 모달 -->
<div class="modal-bg" id="offlineModal">
  <div class="modal">
    <h2>🌙 다시 오셨군요!</h2>
    <p>자리를 비운 <b id="offlineTime"></b> 동안<br>왕국이 열심히 일했습니다.</p>
    <div class="amount">+<span id="offlineGold"></span> 💰</div>
    <button class="btn" id="offlineClose">수령하기</button>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
/* =========================================================
   방치형 왕국 (Idle Kingdom)
   - 순수 바닐라 JS / localStorage 저장
   ========================================================= */

// ---------- 큰 숫자 축약 표기 ----------
// 1234 -> 1.23K, 1e6 -> 1.00M ... 이후 aa, ab 단위
const SUFFIX = ["", "K", "M", "B", "T", "aa", "ab", "ac", "ad", "ae", "af", "ag"];
function fmt(n) {
  if (n < 1000) return Math.floor(n).toString();
  let tier = Math.floor(Math.log10(n) / 3);
  if (tier >= SUFFIX.length) tier = SUFFIX.length - 1;
  const scaled = n / Math.pow(1000, tier);
  return scaled.toFixed(2) + SUFFIX[tier];
}
function fmtTime(sec) {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}시간 ${m}분`;
  if (m > 0) return `${m}분 ${s}초`;
  return `${s}초`;
}

// ---------- 게임 데이터 정의 ----------
// 건설 시설: 초당 골드를 생산. 구매할 때마다 비용 1.15배 상승.
const BUILDINGS = [
  { id: "farm",    icon: "🌾", name: "농장",       base: 1,      cost: 15,      desc: "기본 식량과 골드 생산" },
  { id: "mine",    icon: "⛏️", name: "광산",       base: 8,      cost: 120,     desc: "광부들이 금을 캡니다" },
  { id: "market",  icon: "🏪", name: "시장",       base: 47,     cost: 1300,    desc: "교역으로 부를 축적" },
  { id: "castle",  icon: "🏯", name: "성채",       base: 260,    cost: 14000,   desc: "세금을 거두는 요새" },
  { id: "harbor",  icon: "⚓", name: "항구",       base: 1400,   cost: 200000,  desc: "해상 무역의 중심지" },
  { id: "temple",  icon: "⛩️", name: "신전",       base: 7800,   cost: 3.3e6,   desc: "순례자들의 헌금" },
  { id: "wizard",  icon: "🧙", name: "마법탑",     base: 44000,  cost: 5.1e7,   desc: "연금술로 금을 창조" },
  { id: "dragon",  icon: "🐉", name: "용의 둥지",  base: 260000, cost: 7.5e8,   desc: "용이 지키는 보물더미" },
];

// 강화 업그레이드: 클릭 파워 또는 전역 배수 강화 (1회성 구매)
const UPGRADES = [
  { id: "u_click1", icon: "👆", name: "튼튼한 삽",     desc: "클릭당 골드 +4",         cost: 100,    type: "click", value: 4 },
  { id: "u_click2", icon: "⚒️", name: "황금 곡괭이",   desc: "클릭당 골드 +25",        cost: 5000,   type: "click", value: 25 },
  { id: "u_click3", icon: "🗡️", name: "왕의 권능",     desc: "클릭당 골드 +200",       cost: 250000, type: "click", value: 200 },
  { id: "u_mult1",  icon: "📜", name: "번영의 칙령",   desc: "전체 생산량 ×2",         cost: 25000,  type: "mult",  value: 2 },
  { id: "u_mult2",  icon: "🎖️", name: "황금기 선포",   desc: "전체 생산량 ×2",         cost: 2.5e6,  type: "mult",  value: 2 },
  { id: "u_mult3",  icon: "🌟", name: "전설의 시대",   desc: "전체 생산량 ×3",         cost: 5e8,    type: "mult",  value: 3 },
];

// ---------- 게임 상태 ----------
let state;
function defaultState() {
  return {
    gold: 0,
    totalEarned: 0,     // 환생 계산용 누적 획득
    crowns: 0,          // 프레스티지 재화(왕관)
    buildings: {},      // id -> 개수
    upgrades: {},       // id -> true(구매됨)
    lastTime: Date.now(),
  };
}

// 파생 값 계산: 클릭 파워, 초당 생산량
function getMultiplier() {
  // 왕관 보너스(개당 +10%) × 구매한 배수 업그레이드
  let mult = 1 + state.crowns * 0.10;
  for (const u of UPGRADES) {
    if (u.type === "mult" && state.upgrades[u.id]) mult *= u.value;
  }
  return mult;
}
function getClickPower() {
  let power = 1;
  for (const u of UPGRADES) {
    if (u.type === "click" && state.upgrades[u.id]) power += u.value;
  }
  return power * getMultiplier();
}
function getPerSecond() {
  let total = 0;
  for (const b of BUILDINGS) {
    const owned = state.buildings[b.id] || 0;
    total += owned * b.base;
  }
  return total * getMultiplier();
}
// 시설 현재 구매 비용 (개수에 따라 지수 증가)
function buildingCost(b) {
  const owned = state.buildings[b.id] || 0;
  return Math.floor(b.cost * Math.pow(1.15, owned));
}

// 환생 시 획득 왕관: 누적 획득량 기반 (제곱근 스케일)
function prestigeGain() {
  const need = 1e6; // 최소 100만 누적부터 의미있게
  if (state.totalEarned < need) return 0;
  return Math.floor(Math.sqrt(state.totalEarned / 1e6));
}

// ---------- DOM 참조 ----------
const $ = (id) => document.getElementById(id);
const goldVal = $("goldVal"), rateVal = $("rateVal"), gemVal = $("gemVal");
const perClick = $("perClick");

// ---------- 렌더링 ----------
function renderBuildings() {
  const container = $("tab-build");
  container.innerHTML = "";
  for (const b of BUILDINGS) {
    const owned = state.buildings[b.id] || 0;
    const cost = buildingCost(b);
    const can = state.gold >= cost;
    // 이전 시설을 하나도 안 샀으면 잠금(자연스러운 진행)
    const idx = BUILDINGS.indexOf(b);
    const prevOwned = idx === 0 ? 1 : (state.buildings[BUILDINGS[idx-1].id] || 0);
    const locked = prevOwned === 0 && owned === 0;

    const card = document.createElement("div");
    card.className = "card" + (locked ? " locked" : (can ? " affordable" : ""));
    const prodEach = fmt(b.base * getMultiplier());
    card.innerHTML = `
      <div class="icon">${locked ? "🔒" : b.icon}</div>
      <div class="info">
        <div class="name">${locked ? "??? (이전 건물 필요)" : b.name}</div>
        <div class="desc">${locked ? "" : b.desc}</div>
        <div class="prod">${locked ? "" : `개당 +${prodEach}/초`}</div>
      </div>
      <div class="right">
        <div class="cost ${can ? "" : "cant"}">💰 ${fmt(cost)}</div>
        <div class="owned">보유 ${owned}</div>
      </div>`;
    if (!locked) card.onclick = () => buyBuilding(b);
    container.appendChild(card);
  }
}

function renderUpgrades() {
  const container = $("tab-upgrade");
  container.innerHTML = "";
  for (const u of UPGRADES) {
    const bought = !!state.upgrades[u.id];
    const can = !bought && state.gold >= u.cost;
    const card = document.createElement("div");
    card.className = "card" + (bought ? " locked" : (can ? " affordable" : ""));
    card.innerHTML = `
      <div class="icon">${u.icon}</div>
      <div class="info">
        <div class="name">${u.name} ${bought ? "✅" : ""}</div>
        <div class="desc">${u.desc}</div>
      </div>
      <div class="right">
        <div class="cost ${bought ? "" : (can ? "" : "cant")}">${bought ? "구매완료" : "💰 " + fmt(u.cost)}</div>
      </div>`;
    if (!bought) card.onclick = () => buyUpgrade(u);
    container.appendChild(card);
  }
}

function renderPrestige() {
  const gain = prestigeGain();
  $("prestigeGain").textContent = gain;
  $("prestigeBtn").disabled = gain <= 0;
  if (gain <= 0) {
    $("prestigeReq").textContent = `누적 100만 골드 획득 시 환생 가능 (현재 ${fmt(state.totalEarned)})`;
  } else {
    $("prestigeReq").textContent = `환생하면 왕국이 리셋되지만 강해집니다!`;
  }
}

// 상단 스탯 + 버튼 상태 갱신 (매 프레임 가벼운 갱신)
function renderStats() {
  goldVal.textContent = fmt(state.gold);
  rateVal.textContent = fmt(getPerSecond());
  gemVal.textContent = fmt(state.crowns);
  perClick.textContent = fmt(getClickPower());
}

// ---------- 구매 로직 ----------
function buyBuilding(b) {
  const cost = buildingCost(b);
  if (state.gold < cost) { toast("골드가 부족합니다!"); return; }
  state.gold -= cost;
  state.buildings[b.id] = (state.buildings[b.id] || 0) + 1;
  renderBuildings();
}
function buyUpgrade(u) {
  if (state.upgrades[u.id]) return;
  if (state.gold < u.cost) { toast("골드가 부족합니다!"); return; }
  state.gold -= u.cost;
  state.upgrades[u.id] = true;
  toast(`${u.name} 구매! ${u.desc}`);
  renderUpgrades();
  renderBuildings();
}

function doPrestige() {
  const gain = prestigeGain();
  if (gain <= 0) return;
  if (!confirm(`환생하여 💎${gain} 왕관을 얻으시겠습니까?\n골드와 건물이 모두 초기화됩니다.`)) return;
  const keepCrowns = state.crowns + gain;
  state = defaultState();
  state.crowns = keepCrowns;
  toast(`👑 환생 완료! 왕관 ${keepCrowns}개 (생산량 +${keepCrowns*10}%)`);
  renderAll();
  save();
}

// ---------- 클릭 처리 ----------
function handleClick(e) {
  const power = getClickPower();
  state.gold += power;
  state.totalEarned += power;
  spawnFloat(e, "+" + fmt(power));
}
function spawnFloat(e, text) {
  const zone = $("clickZone");
  const rect = zone.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "float";
  el.textContent = text;
  let x, y;
  if (e.touches && e.touches[0]) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
  else { x = e.clientX; y = e.clientY; }
  el.style.left = (x - rect.left - 10) + "px";
  el.style.top = (y - rect.top - 20) + "px";
  zone.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ---------- 게임 루프 (delta-time) ----------
let lastFrame = Date.now();
function loop() {
  const now = Date.now();
  const dt = (now - lastFrame) / 1000; // 초 단위 경과
  lastFrame = now;
  const gain = getPerSecond() * dt;
  state.gold += gain;
  state.totalEarned += gain;
  renderStats();
  // 구매 가능 여부가 바뀔 수 있으니 현재 탭 카드 하이라이트만 가볍게 갱신
  refreshAffordability();
  requestAnimationFrame(loop);
}
// 매 프레임 전체 innerHTML을 다시 그리면 무거우므로, 클래스만 토글
function refreshAffordability() {
  const buildCards = $("tab-build").children;
  BUILDINGS.forEach((b, i) => {
    const card = buildCards[i]; if (!card || card.classList.contains("locked")) return;
    const can = state.gold >= buildingCost(b);
    card.classList.toggle("affordable", can);
    const costEl = card.querySelector(".cost");
    if (costEl) costEl.classList.toggle("cant", !can);
  });
  const upCards = $("tab-upgrade").children;
  UPGRADES.forEach((u, i) => {
    const card = upCards[i]; if (!card || state.upgrades[u.id]) return;
    const can = state.gold >= u.cost;
    card.classList.toggle("affordable", can);
    const costEl = card.querySelector(".cost");
    if (costEl) costEl.classList.toggle("cant", !can);
  });
}

// ---------- 저장 / 로드 ----------
const SAVE_KEY = "idleKingdomSave_v1";
function save(silent) {
  state.lastTime = Date.now();
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  if (!silent) toast("💾 저장되었습니다");
}
function load() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) { state = defaultState(); return; }
  try {
    const loaded = JSON.parse(raw);
    state = Object.assign(defaultState(), loaded);
    state.buildings = loaded.buildings || {};
    state.upgrades = loaded.upgrades || {};
  } catch { state = defaultState(); }
}
function resetGame() {
  if (!confirm("정말 모든 진행 상황을 초기화할까요? 되돌릴 수 없습니다.")) return;
  localStorage.removeItem(SAVE_KEY);
  state = defaultState();
  renderAll();
  toast("게임이 초기화되었습니다");
}

// ---------- 오프라인 보상 ----------
function checkOffline() {
  const elapsed = (Date.now() - (state.lastTime || Date.now())) / 1000;
  if (elapsed < 10) return; // 10초 미만은 무시
  const capped = Math.min(elapsed, 60 * 60 * 8); // 최대 8시간까지만 보상
  const earned = getPerSecond() * capped;
  if (earned <= 0) return;
  state.gold += earned;
  state.totalEarned += earned;
  $("offlineTime").textContent = fmtTime(elapsed);
  $("offlineGold").textContent = fmt(earned);
  $("offlineModal").classList.add("show");
}

// ---------- 토스트 ----------
let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ---------- 탭 전환 ----------
function setupTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const which = tab.dataset.tab;
      $("tab-build").classList.toggle("hidden", which !== "build");
      $("tab-upgrade").classList.toggle("hidden", which !== "upgrade");
      $("tab-prestige").classList.toggle("hidden", which !== "prestige");
      if (which === "prestige") renderPrestige();
    };
  });
}

function renderAll() {
  renderBuildings();
  renderUpgrades();
  renderPrestige();
  renderStats();
}

// ---------- 초기화 ----------
function init() {
  load();
  renderAll();
  setupTabs();
  checkOffline();

  // 클릭(마우스+터치)
  const btn = $("bigBtn");
  btn.addEventListener("click", handleClick);

  // 버튼 이벤트
  $("prestigeBtn").onclick = doPrestige;
  $("saveBtn").onclick = () => save(false);
  $("resetBtn").onclick = resetGame;
  $("offlineClose").onclick = () => $("offlineModal").classList.remove("show");

  // 3초마다 자동 저장 + 프레스티지 탭 갱신
  setInterval(() => { save(true); renderPrestige(); }, 3000);
  // 종료 시 저장
  window.addEventListener("beforeunload", () => save(true));

  lastFrame = Date.now();
  requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
