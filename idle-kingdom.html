<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ 방치형 왕국 - Idle Kingdom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>⚔️ 방치형 왕국
      <span class="sub">Idle Kingdom — 왕국을 키워 대륙을 지배하라</span>
    </h1>
  </header>

  <!-- 상단 스탯 -->
  <div class="stat-bar">
    <div class="stat">
      <div class="val gold" id="goldVal">0</div>
      <div class="lbl">💰 골드</div>
    </div>
    <div class="stat">
      <div class="val rate" id="rateVal">0</div>
      <div class="lbl">⏱️ 초당 생산</div>
    </div>
    <div class="stat">
      <div class="val gem" id="gemVal">0</div>
      <div class="lbl">💎 왕관(환생)</div>
    </div>
  </div>

  <!-- 클릭 영역 -->
  <div class="click-zone" id="clickZone">
    <div class="big-btn" id="bigBtn">🏰</div>
    <div class="hint">왕국을 눌러 <span class="per-click" id="perClick">1</span> 골드 채집</div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" data-tab="build">🏗️ 건설</div>
    <div class="tab" data-tab="upgrade">⬆️ 강화</div>
    <div class="tab" data-tab="prestige">👑 환생</div>
  </div>

  <!-- 건설 탭 -->
  <div id="tab-build" class="list"></div>

  <!-- 강화 탭 -->
  <div id="tab-upgrade" class="list hidden"></div>

  <!-- 환생 탭 -->
  <div id="tab-prestige" class="hidden">
    <div class="prestige-panel">
      <h3>👑 환생 (프레스티지)</h3>
      <p>왕국을 리셋하는 대신 <b>왕관</b>을 얻습니다.<br>
         왕관 1개당 <b>모든 생산량 +10%</b> 영구 보너스!</p>
      <div class="gain">환생 시 획득: 💎 <span id="prestigeGain">0</span> 왕관</div>
      <p id="prestigeReq" style="margin-bottom:14px;"></p>
      <button class="btn purple" id="prestigeBtn">👑 환생하기</button>
    </div>
  </div>

  <!-- 하단 액션 -->
  <div class="footer-actions">
    <button class="btn ghost" id="saveBtn">💾 저장</button>
    <button class="btn ghost" id="resetBtn">🗑️ 초기화</button>
  </div>
</div>

<!-- 오프라인 보상 모달 -->
<div class="modal-bg" id="offlineModal">
  <div class="modal">
    <h2>🌙 다시 오셨군요!</h2>
    <p>자리를 비운 <b id="offlineTime"></b> 동안<br>왕국이 열심히 일했습니다.</p>
    <div class="amount">+<span id="offlineGold"></span> 💰</div>
    <button class="btn" id="offlineClose">수령하기</button>
  </div>
</div>

<div id="toast"></div>

<script src="game.js"></script>
</body>
</html>
